name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install bats-core
          else
            sudo apt-get update
            sudo apt-get install -y bats
          fi

      - name: Install shellcheck
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install shellcheck
          else
            sudo apt-get install -y shellcheck
          fi

      - name: Install python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyflakes
        # Makefile's lint target runs `python3 -m pyflakes bin/*.py`. setup-python
        # only provides the interpreter; pyflakes must be installed explicitly.
        # We use pip (already available after setup-python) instead of the OS
        # package manager so the same command works on Ubuntu + macOS runners.
        run: python3 -m pip install pyflakes

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Install check (verify install copies all files cleanly)
        run: |
          # Scripts now self-locate at runtime (no __CC_KIT_DIR__ placeholder
          # substitution). We verify install.sh correctly copies the source
          # tree to the test path and that the copy is complete + valid.
          make install-local
          make check-installed
          # Smoke test: the installed cc-help should run without error.
          bash "$HOME/.cc-kit-test/bin/cc-help" >/dev/null
          echo "✓ install + smoke test passed"
