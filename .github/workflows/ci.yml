name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + test (ubuntu)
    runs-on: ubuntu-latest

    # Why ubuntu-only: cc-kit is developed and tested on Linux (Ubuntu 24.04).
    # macOS scripts are written defensively (bash 3.2-compatible syntax, no
    # GNU-only utilities like `stat -c` or `find -printf`, `date -r FILE` for
    # mtime, etc.) but there is no macOS runner available to the maintainer
    # for verification. Until that exists, this CI runs Ubuntu only and
    # macOS compatibility is best-effort — see README.md "Platform support"
    # for what is and isn't covered.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Install python3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pyflakes
        # Makefile's lint target runs `python3 -m pyflakes bin/*.py`. setup-python
        # only provides the interpreter; pyflakes must be installed explicitly.
        run: python3 -m pip install pyflakes

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Install check (verify install copies all files cleanly)
        run: |
          # Scripts now self-locate at runtime (no __CC_KIT_DIR__ placeholder
          # substitution). We verify install.sh correctly copies the source
          # tree to the test path and that the copy is complete + valid.
          make install-local
          make check-installed
          # Smoke test: the installed cc-help should run without error.
          bash "$HOME/.cc-kit-test/bin/cc-help" >/dev/null
          echo "✓ install + smoke test passed"